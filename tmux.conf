bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% lazygit 
bind -r * run-shell '\
  SESSION="opencode-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "opencode"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

set-option -g @fzf-links-editor-open-cmd "tmux popup -E -w 100% -h 100% /opt/homebrew/bin/nvim +%line '%file'"
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
# set -g @sessionx-bind-zo-new-window 'ctrl-y'
# set -g @sessionx-bind 'o'
# set -g @sessionx-zoxide-mode 'on'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @tilish-default 'main-vertical'

# Start visual selection like vim 'v'
bind-key -T copy-mode-vi v send -X begin-selection

# Visual line mode like 'V'
bind-key -T copy-mode-vi V send -X select-line

# Visual block mode like Ctrl-v
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

TMUX_FZF_LAUNCH_KEY="C-f"

# Open opencode workspace: 4 panes in current window + 4 new windows with 4 panes each
bind v run-shell '~/.config/tmux/scripts/open-opencode-workspace.sh'
bind V run-shell '~/.config/tmux/scripts/freebuff.sh'

run '~/.tmux/plugins/tpm/tpm'
